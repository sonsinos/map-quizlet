<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>US State Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-slate-50 font-sans text-slate-800 h-[100dvh] flex flex-col overflow-hidden select-none">

    <!-- Header / Scoreboard -->
    <header class="bg-white shadow-sm z-40 relative">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-2 pt-4 pb-2 md:py-3 relative z-50 bg-white">
            <h1 id="header-title" class="text-lg md:text-2xl font-bold text-slate-700 shrink-0 mr-1">
                <!-- Dynamic Flag & Title -->
            </h1>
            
            <!-- Scoreboard / Toggle Button -->
            <button id="score-toggle" onclick="toggleHistory()" class="flex items-center gap-1 md:gap-4 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg px-2 py-1 md:px-4 md:py-2 transition-colors group flex-grow justify-center max-w-md mx-2">
                <div class="flex gap-3 md:gap-6 text-xs md:text-sm font-medium w-full justify-around">
                    <div class="flex flex-col items-center">
                        <span id="score-correct-label" class="text-[10px] text-slate-400 uppercase tracking-wider hidden sm:inline">Correct</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider sm:hidden">✔</span>
                        <span id="score-correct" class="text-green-600 font-bold text-base md:text-lg leading-none">0</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span id="score-wrong-label" class="text-[10px] text-slate-400 uppercase tracking-wider hidden sm:inline">Faulty</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider sm:hidden">✘</span>
                        <span id="score-wrong" class="text-red-600 font-bold text-base md:text-lg leading-none">0</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span id="score-left-label" class="text-[10px] text-slate-400 uppercase tracking-wider hidden sm:inline">To Go</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider sm:hidden">Left</span>
                        <span id="score-left" class="text-blue-600 font-bold text-base md:text-lg leading-none">-</span>
                    </div>
                </div>
                <!-- Chevron Icon -->
                <svg class="chevron w-3 h-3 md:w-4 md:h-4 text-slate-400 group-hover:text-slate-600 ml-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
            
            <button onclick="resetGame()" class="text-xs md:text-sm text-slate-500 hover:text-slate-800 underline shrink-0 ml-1">Restart</button>
        </div>

        <!-- History Dropdown (Absolute Panel) -->
        <div id="history-panel" class="hidden absolute top-full left-0 w-full bg-slate-50/95 backdrop-blur-sm border-b shadow-lg z-40 max-h-[70vh] flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x divide-slate-200 overflow-hidden">
            
            <!-- Match History Section -->
            <div class="flex-1 flex flex-col min-h-0 h-1/2 md:h-auto p-2">
                <div class="pb-2 border-b border-slate-200 font-bold text-xs uppercase text-slate-500 tracking-wider text-center shrink-0">
                    Match History
                </div>
                <div id="list-completed" class="overflow-y-auto flex-1 p-1 grid grid-cols-1 sm:grid-cols-2 gap-1 mt-1">
                    <!-- Completed items populated here -->
                    <div class="text-center text-slate-400 italic text-xs py-4 col-span-full" id="history-placeholder">No items guessed yet</div>
                </div>
            </div>

            <!-- Items to Learn Section -->
            <div class="flex-1 flex flex-col min-h-0 h-1/2 md:h-auto p-2 bg-red-50/40">
                <div id="learn-section-header" class="pb-2 border-b border-slate-200 font-bold text-xs uppercase text-red-600 tracking-wider text-center shrink-0">
                    Items to Learn
                </div>
                <div id="list-incorrect" class="overflow-y-auto flex-grow p-1 grid grid-cols-1 sm:grid-cols-2 gap-1 mt-1">
                    <div class="text-center text-slate-400 italic text-xs py-4 col-span-full" id="incorrect-placeholder">No items to review yet</div>
                </div>
            </div>

        </div>
    </header>

    <!-- Main Game Area -->
    <main class="flex-grow flex flex-col lg:flex-row gap-2 lg:gap-4 p-2 lg:p-4 w-full max-w-7xl mx-auto overflow-hidden relative z-0">
        
        <!-- Sidebar List (Left on Desktop, Bottom on Mobile) - ONLY REMAINING ITEMS -->
        <aside class="order-2 lg:order-1 w-full lg:w-64 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-48 lg:h-full shrink-0 overflow-hidden">
            <div id="sidebar-header" class="p-2 bg-slate-50 border-b font-bold text-xs uppercase text-slate-500 tracking-wider text-center shrink-0">
                Select Item
            </div>
            <div id="list-remaining" class="region-list overflow-y-auto flex-1 p-1 space-y-1 min-h-0">
                <!-- Remaining items -->
            </div>
        </aside>

        <!-- Map Container -->
        <div class="order-1 lg:order-2 flex-grow relative bg-white rounded-xl shadow-sm border border-slate-200 p-1 lg:p-4 flex items-center justify-center overflow-hidden touch-none" id="map-container">
            
            <!-- Feedback Overlay -->
            <div id="feedback-container" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur shadow-lg rounded-xl px-6 py-3 hidden z-30 border border-slate-100 text-center pointer-events-none transition-all duration-300">
                <h2 id="feedback-title" class="text-lg font-bold"></h2>
                <p id="feedback-message" class="text-sm text-slate-600"></p>
            </div>

            <!-- Zoom Controls -->
            <div class="absolute bottom-4 right-4 flex flex-col gap-2 z-20">
                <button class="zoom-btn" onclick="zoomMap(1.5)" title="Zoom In">+</button>
                <button class="zoom-btn" onclick="resetZoom()" title="Reset View">⟲</button>
                <button class="zoom-btn" onclick="zoomMap(0.66)" title="Zoom Out">-</button>
            </div>

            <!-- SVG Map - Generic SVG ViewBox -->
            <div class="w-full h-full relative overflow-hidden cursor-grab active:cursor-grabbing">
                <svg id="map-svg" class="w-full h-full drop-shadow-md">
                    <g id="map-content" class="transition-transform duration-200 ease-out will-change-transform">
                        <!-- Paths injected by JS -->
                    </g>
                </svg>
            </div>
        </div>

    </main>

    <!-- Controls -->
    <footer class="bg-white border-t p-3 pb-6 shrink-0 z-50">
        <div class="max-w-2xl mx-auto w-full">
            <div id="input-area" class="flex gap-2">
                <div class="relative flex-grow">
                    <!-- Autocomplete Dropdown -->
                    <div id="autocomplete-list" class="absolute bottom-full left-0 w-full bg-white border border-slate-200 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden z-50 mb-2">
                        <!-- Items injected by JS -->
                    </div>
                    <input type="text" id="guess-input" 
                        placeholder="Type name here..." 
                        class="w-full p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg"
                        autocomplete="off">
                </div>
                <button id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 md:px-6 py-3 rounded-lg font-bold shadow-sm transition-colors">
                    Check
                </button>
            </div>
            <div id="game-over-area" class="hidden text-center">
                <h2 id="game-over-title" class="text-2xl font-bold mb-2">Quiz Complete!</h2>
                <p id="final-score" class="mb-4 text-slate-600"></p>
                <div class="flex flex-col sm:flex-row gap-2 justify-center items-center">
                    <button id="btn-play-again" onclick="resetGame()" class="bg-slate-800 text-white px-6 py-2 rounded-lg hover:bg-slate-700 transition-colors font-semibold">Play Again</button>
                    <button id="btn-review-game" onclick="startReviewGame()" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition-colors font-semibold hidden">Review Wrong Items</button>
                </div>
            </div>
        </div>
    </footer>

    <script type="module">
        // Dynamic Load of Quiz Configuration
        const urlParams = new URLSearchParams(window.location.search);
        const quizName = urlParams.get('quiz') || 'states';
        const modulePath = `./${quizName}_data.js`;

        let quizConfig;
        try {
            const module = await import(modulePath);
            quizConfig = module.quizConfig;
        } catch (e) {
            console.error("Failed to dynamically load quiz configuration, showing error fallback.", e);
            alert(`Failed to load quiz "${quizName}". Falling back to default quiz.`);
            const module = await import("./states_data.js");
            quizConfig = module.quizConfig;
        }

        // Game State Variables
        let remainingItems = [];
        let currentTarget = null;
        let scoreCorrect = 0;
        let scoreWrong = 0;
        let gameActive = false;
        let itemStatuses = {}; // Stores 'correct' or 'wrong' for uncovered items
        let feedbackTimeout;
        let lastSelectionWasSearchbox = true;
        let incorrectItems = new Set();
        let isReviewMode = false;

        // DOM Elements
        const mapEl = document.getElementById('map-svg');
        const mapGroup = document.getElementById('map-content');
        const mapContainer = document.getElementById('map-container');
        const inputEl = document.getElementById('guess-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackMsg = document.getElementById('feedback-message');
        const scoreCorrectEl = document.getElementById('score-correct');
        const scoreWrongEl = document.getElementById('score-wrong');
        const scoreLeftEl = document.getElementById('score-left');
        const inputArea = document.getElementById('input-area');
        const gameOverArea = document.getElementById('game-over-area');
        const finalScoreEl = document.getElementById('final-score');
        const listRemaining = document.getElementById('list-remaining');
        const listCompleted = document.getElementById('list-completed');
        const autocompleteList = document.getElementById('autocomplete-list');
        const historyPanel = document.getElementById('history-panel');
        const scoreToggle = document.getElementById('score-toggle');
        const historyPlaceholder = document.getElementById('history-placeholder');

        // Zoom/Pan State
        let currentScale = 1;
        let currentTranslate = { x: 0, y: 0 };
        let isDragging = false;
        let lastPanX = 0;
        let lastPanY = 0;
        
        // Pinch Zoom State
        let initialPinchDistance = null;
        let initialScale = null;

        // Apply Dynamic Configurations to UI Elements
        function applyUIConfig() {
            document.title = quizConfig.title;
            document.getElementById('header-title').innerHTML = `${quizConfig.flag} <span class="hidden sm:inline"> ${quizConfig.title}</span>`;
            document.getElementById('history-placeholder').textContent = quizConfig.texts.noGuessesPlaceholder;
            document.getElementById('learn-section-header').textContent = quizConfig.texts.itemsToLearn;
            document.getElementById('incorrect-placeholder').textContent = quizConfig.texts.noReviewPlaceholder;
            document.getElementById('sidebar-header').textContent = quizConfig.texts.selectItem;
            document.getElementById('guess-input').placeholder = quizConfig.texts.inputPlaceholder;
            document.getElementById('game-over-title').textContent = quizConfig.texts.gameOverTitle || "Quiz Complete!";
            document.getElementById('btn-play-again').textContent = quizConfig.texts.playAgain;
            
            mapEl.setAttribute("viewBox", quizConfig.map.viewBox);
            
            document.getElementById('score-correct-label').textContent = quizConfig.texts.scoreCorrectLabel || "Correct";
            document.getElementById('score-wrong-label').textContent = quizConfig.texts.scoreWrongLabel || "Faulty";
            document.getElementById('score-left-label').textContent = quizConfig.texts.scoreLeftLabel || "To Go";
        }

        // Initialize Map Paths
        function initMap() {
            mapGroup.innerHTML = '';
            quizConfig.items.forEach(item => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", item.d);
                path.setAttribute("id", item.id);
                path.setAttribute("class", "region-path");
                path.setAttribute("data-name", item.name);
                mapGroup.appendChild(path);
            });
        }

        // --- History Toggle Logic ---
        function toggleHistory() {
            historyPanel.classList.toggle('hidden');
            scoreToggle.classList.toggle('expanded');
        }

        // --- Zoom & Pan Logic ---

        function updateTransform() {
            mapGroup.setAttribute('transform', `translate(${currentTranslate.x} ${currentTranslate.y}) scale(${currentScale})`);
        }

        function zoomMap(factor) {
            const newScale = currentScale * factor;
            if (newScale >= 0.5 && newScale <= 8) {
                const rect = mapContainer.getBoundingClientRect();
                const pt = mapEl.createSVGPoint();
                pt.x = rect.left + rect.width / 2;
                pt.y = rect.top + rect.height / 2;
                const svgPt = pt.matrixTransform(mapEl.getScreenCTM().inverse());
                
                const tx = svgPt.x - factor * (svgPt.x - currentTranslate.x);
                const ty = svgPt.y - factor * (svgPt.y - currentTranslate.y);
                
                currentScale = newScale;
                currentTranslate = { x: tx, y: ty };
                updateTransform();
            }
        }

        function resetZoom() {
            currentScale = 1;
            currentTranslate = { x: 0, y: 0 };
            updateTransform();
        }

        // Mobile Auto-Zoom Logic
        function autoZoomToItem(item) {
            if (window.innerWidth >= 768) {
                resetZoom();
                return;
            }

            const el = document.getElementById(item.id);
            if (!el) return;

            const bbox = el.getBBox();
            const cx = bbox.x + bbox.width / 2;
            const cy = bbox.y + bbox.height / 2;
            
            // Determine scale based on region size from configuration
            const zoomSettings = quizConfig.map.zoomSettings;
            let targetScale = zoomSettings.mediumScale; 
            if (bbox.width > zoomSettings.largeThreshold || bbox.height > zoomSettings.largeThreshold) {
                targetScale = zoomSettings.largeScale;
            } else if (bbox.width < zoomSettings.smallThreshold || bbox.height < zoomSettings.smallThreshold) {
                targetScale = zoomSettings.smallScale;
            }
            
            const rect = mapContainer.getBoundingClientRect();
            const pt = mapEl.createSVGPoint();
            pt.x = rect.left + rect.width / 2;
            pt.y = rect.top + rect.height / 2;
            
            const svgPt = pt.matrixTransform(mapEl.getScreenCTM().inverse());
            
            const tx = svgPt.x - (cx * targetScale);
            const ty = svgPt.y - (cy * targetScale);
            
            currentScale = targetScale;
            currentTranslate = { x: tx, y: ty };
            updateTransform();
        }

        function getSvgToScreenRatio() {
            // Extract SVG ViewBox dimensions
            const viewBox = mapEl.getAttribute("viewBox").split(" ");
            const svgWidth = parseFloat(viewBox[2]) || 960;
            return svgWidth / mapContainer.clientWidth;
        }

        // Mouse Pan Events
        mapContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            mapGroup.classList.remove('duration-200'); 
            lastPanX = e.clientX;
            lastPanY = e.clientY;
            mapContainer.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const deltaX = e.clientX - lastPanX;
            const deltaY = e.clientY - lastPanY;
            lastPanX = e.clientX;
            lastPanY = e.clientY;

            const ratio = getSvgToScreenRatio();
            currentTranslate.x += deltaX * ratio;
            currentTranslate.y += deltaY * ratio;
            
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            mapGroup.classList.add('duration-200');
            mapContainer.style.cursor = 'grab';
        });

        function getPinchDistance(touches) {
            return Math.hypot(
                touches[0].clientX - touches[1].clientX,
                touches[0].clientY - touches[1].clientY
            );
        }

        // Touch Events (Pan & Pinch)
        mapContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                initialPinchDistance = null;
                mapGroup.classList.remove('duration-200'); 
                const touch = e.touches[0];
                lastPanX = touch.clientX;
                lastPanY = touch.clientY;
            } else if (e.touches.length === 2) {
                isDragging = false; 
                mapGroup.classList.remove('duration-200'); 
                initialPinchDistance = getPinchDistance(e.touches);
                initialScale = currentScale;
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && isDragging) {
                if (e.cancelable) e.preventDefault(); 
                const touch = e.touches[0];
                const deltaX = touch.clientX - lastPanX;
                const deltaY = touch.clientY - lastPanY;
                lastPanX = touch.clientX;
                lastPanY = touch.clientY;

                const ratio = getSvgToScreenRatio();
                currentTranslate.x += deltaX * ratio;
                currentTranslate.y += deltaY * ratio;
                updateTransform();

            } else if (e.touches.length === 2 && initialPinchDistance) {
                if (e.cancelable) e.preventDefault();
                const currentDistance = getPinchDistance(e.touches);
                const zoomFactor = currentDistance / initialPinchDistance;
                
                let newScale = initialScale * zoomFactor;
                
                if (newScale < 0.5) newScale = 0.5;
                if (newScale > 8) newScale = 8;
                
                currentScale = newScale;
                updateTransform();
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isDragging = false;
                initialPinchDistance = null;
                mapGroup.classList.add('duration-200');
            } else if (e.touches.length === 1) {
                isDragging = false; 
                initialPinchDistance = null;
            }
        });


        // --- Game Logic ---

        // Initialize Sidebar List
        function initList() {
            listRemaining.innerHTML = '';
            listCompleted.innerHTML = '';
            listCompleted.appendChild(historyPlaceholder);
            historyPlaceholder.classList.remove('hidden');
            
            const sortedItems = [...remainingItems].sort((a, b) => a.name.localeCompare(b.name));
            
            sortedItems.forEach(item => {
                const btn = document.createElement('button');
                btn.id = `btn-${item.id}`;
                btn.className = "w-full px-4 py-2 hover:bg-slate-100 transition-colors border-b border-slate-100 last:border-0 text-slate-700 font-medium text-sm flex justify-between items-center";
                btn.innerHTML = `
                    <span>${item.name}</span>
                    <span class="px-1.5 py-0.5 text-[10px] font-bold bg-slate-100 text-slate-500 rounded border border-slate-200 uppercase tracking-wider">${item.id}</span>`;
                btn.onclick = () => {
                    if (gameActive) checkAnswer(item.name);
                };
                listRemaining.appendChild(btn);
            });
        }

        // Move item from Remaining to Completed list
        function moveItemToCompleted(item, isCorrect) {
            if (!historyPlaceholder.classList.contains('hidden')) {
                historyPlaceholder.classList.add('hidden');
            }

            const btn = document.getElementById(`btn-${item.id}`);
            if (btn) {
                btn.remove();
            }

            const completedItem = document.createElement('div');
            let classes = "px-3 py-2 rounded border text-sm font-bold flex justify-between items-center";
            
            if (isCorrect) {
                classes += " bg-green-50 border-green-200 text-green-700";
                completedItem.innerHTML = `
                    <span>${item.name}</span>
                    <div class="flex items-center gap-2">
                        <span class="px-1.5 py-0.5 text-[10px] font-bold bg-green-100 text-green-700 rounded border border-green-200 uppercase tracking-wider">${item.id}</span>
                        <span class="text-xs uppercase">✓</span>
                    </div>`;
            } else {
                classes += " bg-red-50 border-red-200 text-red-700";
                completedItem.innerHTML = `
                    <span>${item.name}</span>
                    <div class="flex items-center gap-2">
                        <span class="px-1.5 py-0.5 text-[10px] font-bold bg-red-100 text-red-700 rounded border border-red-200 uppercase tracking-wider">${item.id}</span>
                        <span class="text-xs uppercase">✗</span>
                    </div>`;
            }
            completedItem.className = classes;

            const existingItems = Array.from(listCompleted.children).filter(el => el.id !== 'history-placeholder');
            const nextItem = existingItems.find(el => el.textContent.trim().split(' ')[0].localeCompare(item.name) > 0);
            
            if (nextItem) {
                listCompleted.insertBefore(completedItem, nextItem);
            } else {
                listCompleted.appendChild(completedItem);
            }
        }

        // Initialize Game
        function startGame(onlyReview = false) {
            isReviewMode = onlyReview;
            if (onlyReview) {
                remainingItems = quizConfig.items.filter(item => incorrectItems.has(item.id));
            } else {
                remainingItems = [...quizConfig.items]; 
                incorrectItems.clear();
                const learnContainer = document.getElementById('list-incorrect');
                if (learnContainer) {
                    learnContainer.innerHTML = `<div class="text-center text-slate-400 italic text-xs py-2" id="incorrect-placeholder">${quizConfig.texts.noReviewPlaceholder}</div>`;
                }
            }
            
            scoreCorrect = 0;
            scoreWrong = 0;
            gameActive = true;
            itemStatuses = {}; 
            lastSelectionWasSearchbox = true;
            
            updateScoreboard();
            inputArea.classList.remove('hidden');
            gameOverArea.classList.add('hidden');
            feedbackContainer.classList.add('hidden');
            historyPanel.classList.add('hidden');
            scoreToggle.classList.remove('expanded');
            inputEl.value = '';
            inputEl.focus();

            document.querySelectorAll('.region-path').forEach(el => {
                el.classList.remove('active-region', 'correct-region', 'wrong-region');
            });

            document.querySelectorAll('.region-label').forEach(el => el.remove());

            initList();
            resetZoom();
            nextRound();
        }

        function updateScoreboard() {
            scoreCorrectEl.textContent = scoreCorrect;
            scoreWrongEl.textContent = scoreWrong;
            scoreLeftEl.textContent = remainingItems.length + (currentTarget ? 1 : 0);
        }

        function nextRound() {
            if (remainingItems.length === 0) {
                endGame();
                return;
            }

            const randomIndex = Math.floor(Math.random() * remainingItems.length);
            currentTarget = remainingItems[randomIndex];
            remainingItems.splice(randomIndex, 1);
            
            highlightItem(currentTarget.id);
            updateScoreboard();
            autoZoomToItem(currentTarget);
            
            inputEl.value = '';
            if (lastSelectionWasSearchbox) {
                inputEl.focus();
            }
            gameActive = true;
        }

        function highlightItem(id) {
            document.querySelectorAll('.active-region').forEach(el => {
                el.classList.remove('active-region');
            });

            const el = document.getElementById(id);
            if (el) {
                el.classList.add('active-region');
            }
        }

        function checkAnswer(manualGuess = null) {
            closeAutocomplete();
            lastSelectionWasSearchbox = !manualGuess;

            if (!currentTarget || !gameActive) return;

            const userGuess = manualGuess ? manualGuess.toLowerCase() : inputEl.value.trim().toLowerCase();
            const matchedItem = quizConfig.items.find(item => item.name.toLowerCase() === userGuess || item.id.toLowerCase() === userGuess);
            
            if (!matchedItem) {
                inputEl.classList.add('shake');
                setTimeout(() => inputEl.classList.remove('shake'), 500);
                return;
            }

            const correctName = currentTarget.name.toLowerCase();
            const itemEl = document.getElementById(currentTarget.id);

            gameActive = false; 
            feedbackContainer.classList.add('hidden');
            if (feedbackTimeout) clearTimeout(feedbackTimeout);

            if (matchedItem.name.toLowerCase() === correctName) {
                scoreCorrect++;
                itemStatuses[correctName] = 'correct'; 
                itemEl.classList.remove('active-region');
                itemEl.classList.add('correct-region');
                
                addLabelToMap(currentTarget);
                moveItemToCompleted(currentTarget, true);

                if (isReviewMode && incorrectItems.has(currentTarget.id)) {
                    incorrectItems.delete(currentTarget.id);
                    const card = document.getElementById(`learn-${currentTarget.id}`);
                    if (card) card.remove();
                    if (incorrectItems.size === 0) {
                        const placeholder = document.getElementById('incorrect-placeholder');
                        if (placeholder) placeholder.classList.remove('hidden');
                    }
                }

                showFeedback(true, currentTarget.name);
                setTimeout(nextRound, 1000); 
            } else {
                scoreWrong++;
                itemStatuses[correctName] = 'wrong';
                itemEl.classList.remove('active-region');
                itemEl.classList.add('wrong-region');
                
                addLabelToMap(currentTarget);
                moveItemToCompleted(currentTarget, false);

                addItemToLearn(currentTarget);
                if (matchedItem) {
                    addItemToLearn(matchedItem);
                }

                if (!manualGuess) {
                    inputEl.classList.add('shake');
                    setTimeout(() => inputEl.classList.remove('shake'), 500);
                }

                showFeedback(false, currentTarget.name);
                setTimeout(nextRound, 2500); 
            }
        }

        function addItemToLearn(item) {
            if (incorrectItems.has(item.id)) return;
            incorrectItems.add(item.id);

            const placeholder = document.getElementById('incorrect-placeholder');
            if (placeholder) placeholder.classList.add('hidden');

            const learnItem = document.createElement('div');
            learnItem.id = `learn-${item.id}`;
            learnItem.className = "px-3 py-2 rounded border border-slate-200 bg-white text-slate-700 text-xs font-bold flex justify-between items-center shadow-sm hover:border-red-200 transition-colors";
            learnItem.innerHTML = `
                <span>${item.name}</span>
                <span class="px-1.5 py-0.5 text-[9px] font-bold bg-slate-100 text-slate-500 rounded border border-slate-200 uppercase tracking-wider">${item.id}</span>`;

            const container = document.getElementById('list-incorrect');
            const existingItems = Array.from(container.children).filter(el => el.id !== 'incorrect-placeholder');
            const nextItem = existingItems.find(el => el.querySelector('span').textContent.localeCompare(item.name) > 0);

            if (nextItem) {
                container.insertBefore(learnItem, nextItem);
            } else {
                container.appendChild(learnItem);
            }
        }

        function addLabelToMap(item) {
            const labelField = quizConfig.map.labelField;
            if (!labelField) return;

            const el = document.getElementById(item.id);
            if (!el) return;
            
            const bbox = el.getBBox();
            const centerX = bbox.x + bbox.width / 2;
            const centerY = bbox.y + bbox.height / 2;

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", centerX);
            text.setAttribute("y", centerY);
            text.setAttribute("class", "region-label");
            text.textContent = item[labelField];
            
            mapGroup.appendChild(text);
        }

        function showFeedback(isCorrect, name) {
            feedbackContainer.classList.remove('hidden');
            if (feedbackTimeout) clearTimeout(feedbackTimeout);

            if (isCorrect) {
                feedbackContainer.classList.remove('border-red-200', 'bg-red-50');
                feedbackContainer.classList.add('border-green-200', 'bg-green-50');
                feedbackTitle.textContent = "Correct!";
                feedbackTitle.className = "text-lg font-bold text-green-700";
                feedbackMsg.textContent = `${name} is correct.`;
            } else {
                feedbackContainer.classList.remove('border-green-200', 'bg-green-50');
                feedbackContainer.classList.add('border-red-200', 'bg-red-50');
                feedbackTitle.textContent = "Wrong!";
                feedbackTitle.className = "text-lg font-bold text-red-700";
                feedbackMsg.textContent = `That was ${name}.`;
            }

            feedbackTimeout = setTimeout(() => {
                feedbackContainer.classList.add('hidden');
            }, 3000);
        }

        function endGame() {
            currentTarget = null;
            updateScoreboard();
            inputArea.classList.add('hidden');
            gameOverArea.classList.remove('hidden');
            
            let gameOverDesc = quizConfig.texts.gameOverDescription
                .replace('{correct}', scoreCorrect)
                .replace('{wrong}', scoreWrong);
            finalScoreEl.textContent = gameOverDesc;
            feedbackContainer.classList.add('hidden');

            const reviewBtn = document.getElementById('btn-review-game');
            if (reviewBtn) {
                if (incorrectItems.size > 0) {
                    reviewBtn.classList.remove('hidden');
                    reviewBtn.textContent = `${quizConfig.texts.reviewWrong} (${incorrectItems.size})`;
                } else {
                    reviewBtn.classList.add('hidden');
                }
            }
        }

        submitBtn.addEventListener('click', () => checkAnswer());
        
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const firstItem = autocompleteList.querySelector('div');
                const isListVisible = !autocompleteList.classList.contains('hidden');
                
                if (isListVisible && firstItem && !firstItem.hasAttribute('data-disabled')) {
                    e.preventDefault();
                    const suggestion = firstItem.dataset.value;
                    const suggestionId = firstItem.dataset.id;
                    
                    if (inputEl.value.trim().toLowerCase() === suggestion.toLowerCase() ||
                        inputEl.value.trim().toLowerCase() === suggestionId.toLowerCase()) {
                        inputEl.value = suggestion;
                        closeAutocomplete();
                        checkAnswer();
                    } else {
                        inputEl.value = suggestion;
                        closeAutocomplete();
                    }
                } else {
                    checkAnswer();
                }
            }
        });

        inputEl.addEventListener('input', function() {
            const val = this.value;
            closeAutocomplete();
            if (!val) return;

            const matches = quizConfig.items.filter(item => 
                (item.name.toLowerCase().startsWith(val.toLowerCase()) ||
                item.id.toLowerCase().startsWith(val.toLowerCase())) &&
                !itemStatuses[item.name.toLowerCase()]
            );
            
            matches.sort((a, b) => a.name.localeCompare(b.name));

            if (matches.length > 0) {
                autocompleteList.classList.remove('hidden');
                matches.forEach(item => {
                    const div = document.createElement('div');
                    let classes = "px-4 py-2 border-b border-slate-50 last:border-0 flex justify-between items-center hover:bg-slate-100 cursor-pointer text-slate-700";
                    
                    let nameHtml;
                    if (item.name.toLowerCase().startsWith(val.toLowerCase())) {
                        nameHtml = `<strong>${item.name.substr(0, val.length)}</strong>${item.name.substr(val.length)}`;
                    } else {
                        nameHtml = item.name;
                    }

                    let idBadgeHtml;
                    if (item.id.toLowerCase().startsWith(val.toLowerCase())) {
                        idBadgeHtml = `<strong>${item.id.substr(0, val.length)}</strong>${item.id.substr(val.length)}`;
                    } else {
                        idBadgeHtml = item.id;
                    }

                    div.innerHTML = `
                        <span>${nameHtml}</span>
                        <span class="px-1.5 py-0.5 text-[10px] font-bold bg-slate-100 text-slate-500 rounded border border-slate-200 uppercase tracking-wider">${idBadgeHtml}</span>`;
                    
                    div.addEventListener('click', function() {
                        inputEl.value = item.name;
                        closeAutocomplete();
                        inputEl.focus();
                    });
                    
                    div.className = classes;
                    div.dataset.value = item.name;
                    div.dataset.id = item.id;
                    autocompleteList.appendChild(div);
                });
            }
        });

        function closeAutocomplete() {
            autocompleteList.innerHTML = '';
            autocompleteList.classList.add('hidden');
        }

        document.addEventListener('click', function(e) {
            if (e.target !== inputEl && e.target !== autocompleteList) {
                closeAutocomplete();
            }
        });

        window.resetGame = () => startGame(false);
        window.startReviewGame = () => startGame(true);
        window.endGame = endGame;
        window.zoomMap = zoomMap;
        window.resetZoom = resetZoom;
        window.toggleHistory = toggleHistory;

        // Initialize Page and Start Game
        applyUIConfig();
        initMap();
        initList();
        startGame(false);

    </script>
</body>
</html>
