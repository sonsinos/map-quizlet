<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>US State Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link id="favicon" rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-slate-50 font-sans text-slate-800 h-[100dvh] flex flex-col overflow-hidden select-none">

    <!-- Header / Scoreboard -->
    <header class="bg-white shadow-sm z-40 relative">
        <div class="max-w-6xl mx-auto flex justify-between items-center px-2 pt-4 pb-2 md:py-3 relative z-50 bg-white">
            <h1 id="header-title" class="text-lg md:text-2xl font-bold text-slate-700 shrink-0 mr-1">
                <!-- Dynamic Flag & Title -->
            </h1>
            
            <!-- Scoreboard / Toggle Button -->
            <button id="score-toggle" class="flex items-center gap-1 md:gap-4 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg px-2 py-1 md:px-4 md:py-2 transition-colors group flex-grow justify-center max-w-md mx-2">
                <div class="flex gap-3 md:gap-6 text-xs md:text-sm font-medium w-full justify-around">
                    <div class="flex flex-col items-center">
                        <span id="score-correct-label" class="text-[10px] text-slate-400 uppercase tracking-wider hidden sm:inline">Correct</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider sm:hidden">✔</span>
                        <span id="score-correct" class="text-green-600 font-bold text-base md:text-lg leading-none">0</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span id="score-wrong-label" class="text-[10px] text-slate-400 uppercase tracking-wider hidden sm:inline">Faulty</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider sm:hidden">✘</span>
                        <span id="score-wrong" class="text-red-600 font-bold text-base md:text-lg leading-none">0</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span id="score-left-label" class="text-[10px] text-slate-400 uppercase tracking-wider hidden sm:inline">To Go</span>
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider sm:hidden">Left</span>
                        <span id="score-left" class="text-blue-600 font-bold text-base md:text-lg leading-none">-</span>
                    </div>
                </div>
                <!-- Chevron Icon -->
                <svg class="chevron w-3 h-3 md:w-4 md:h-4 text-slate-400 group-hover:text-slate-600 ml-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>
            
            <button id="header-restart-btn" class="text-xs md:text-sm text-slate-500 hover:text-slate-800 underline shrink-0 ml-1">Restart</button>
        </div>

        <!-- History Dropdown (Absolute Panel) -->
        <div id="history-panel" class="hidden absolute top-full left-0 w-full bg-slate-50/95 backdrop-blur-sm border-b shadow-lg z-40 max-h-[70vh] flex flex-col md:flex-row divide-y md:divide-y-0 md:divide-x divide-slate-200 overflow-hidden">
            
            <!-- Match History Section -->
            <div class="flex-1 flex flex-col min-h-0 h-1/2 md:h-auto p-2">
                <div class="pb-2 border-b border-slate-200 font-bold text-xs uppercase text-slate-500 tracking-wider text-center shrink-0">
                    Match History
                </div>
                <div id="list-completed" class="overflow-y-auto flex-1 p-1 grid grid-cols-1 sm:grid-cols-2 gap-1 mt-1">
                    <!-- Completed items populated here -->
                    <div class="text-center text-slate-400 italic text-xs py-4 col-span-full" id="history-placeholder">No items guessed yet</div>
                </div>
            </div>

            <!-- Items to Learn Section -->
            <div class="flex-1 flex flex-col min-h-0 h-1/2 md:h-auto p-2 bg-red-50/40">
                <div id="learn-section-header" class="pb-2 border-b border-slate-200 font-bold text-xs uppercase text-red-600 tracking-wider text-center shrink-0">
                    Items to Learn
                </div>
                <div id="list-incorrect" class="overflow-y-auto flex-grow p-1 grid grid-cols-1 sm:grid-cols-2 gap-1 mt-1">
                    <div class="text-center text-slate-400 italic text-xs py-4 col-span-full" id="incorrect-placeholder">No items to review yet</div>
                </div>
            </div>

        </div>
    </header>

    <!-- Main Game Area -->
    <main class="flex-grow flex flex-col lg:flex-row gap-2 lg:gap-4 p-2 lg:p-4 w-full max-w-7xl mx-auto overflow-hidden relative z-0">
        
        <!-- Sidebar List (Left on Desktop, Bottom on Mobile) - ONLY REMAINING ITEMS -->
        <aside class="order-2 lg:order-1 w-full lg:w-64 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-48 lg:h-full shrink-0 overflow-hidden">
            <div id="sidebar-header" class="p-2 bg-slate-50 border-b font-bold text-xs uppercase text-slate-500 tracking-wider text-center shrink-0">
                Select Item
            </div>
            <div id="list-remaining" class="region-list overflow-y-auto flex-1 p-1 space-y-1 min-h-0">
                <!-- Remaining items -->
            </div>
        </aside>

        <!-- Map Container -->
        <div class="order-1 lg:order-2 flex-grow relative bg-white rounded-xl shadow-sm border border-slate-200 p-1 lg:p-4 flex items-center justify-center overflow-hidden touch-none" id="map-container">
            
            <!-- Feedback Overlay -->
            <div id="feedback-container" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-white/95 backdrop-blur shadow-lg rounded-xl px-6 py-3 hidden z-30 border border-slate-100 text-center pointer-events-none transition-all duration-300">
                <h2 id="feedback-title" class="text-lg font-bold"></h2>
                <p id="feedback-message" class="text-sm text-slate-600"></p>
            </div>

            <!-- Zoom Controls -->
            <div class="absolute bottom-4 right-4 flex flex-col gap-2 z-20">
                <button id="zoom-in" class="zoom-btn" title="Zoom In">+</button>
                <button id="zoom-reset" class="zoom-btn" title="Reset View">⟲</button>
                <button id="zoom-out" class="zoom-btn" title="Zoom Out">-</button>
            </div>

            <!-- SVG Map - Generic SVG ViewBox -->
            <div class="w-full h-full relative overflow-hidden cursor-grab active:cursor-grabbing">
                <svg id="map-svg" class="w-full h-full drop-shadow-md">
                    <g id="map-content" class="transition-transform duration-200 ease-out will-change-transform">
                        <!-- Paths injected by JS -->
                    </g>
                </svg>
            </div>
        </div>

    </main>

    <!-- Controls -->
    <footer class="bg-white border-t p-3 pb-6 shrink-0 z-50">
        <div class="max-w-2xl mx-auto w-full">
            <div id="input-area" class="flex gap-2">
                <div class="relative flex-grow">
                    <!-- Autocomplete Dropdown -->
                    <div id="autocomplete-list" class="absolute bottom-full left-0 w-full bg-white border border-slate-200 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden z-50 mb-2">
                        <!-- Items injected by JS -->
                    </div>
                    <input type="text" id="guess-input" 
                        placeholder="Type name here..." 
                        class="w-full p-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg"
                        autocomplete="off">
                </div>
                <button id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 md:px-6 py-3 rounded-lg font-bold shadow-sm transition-colors">
                    Check
                </button>
            </div>
            <div id="game-over-area" class="hidden text-center">
                <h2 id="game-over-title" class="text-2xl font-bold mb-2">Quiz Complete!</h2>
                <p id="final-score" class="mb-4 text-slate-600"></p>
                <div class="flex flex-col sm:flex-row gap-2 justify-center items-center">
                    <button id="btn-play-again" class="bg-slate-800 text-white px-6 py-2 rounded-lg hover:bg-slate-700 transition-colors font-semibold">Play Again</button>
                    <button id="btn-review-game" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition-colors font-semibold hidden">Review Wrong Items</button>
                </div>
            </div>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
